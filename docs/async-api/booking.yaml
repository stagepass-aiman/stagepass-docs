          type: string
          const: '1.0.0'
        eventType:
          type: string
          const: 'booking.cancelled'
        bookingId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        refundAmount:
          $ref: '#/components/schemas/MoneyAmount'
          description: Actual refund amount processed (may be zero for no-refund policies).
        status:
          type: string
          const: 'CANCELLED'
        cancelledAt:
          type: string
          format: date-time

