    BookingCancellationRequestedPayload:
      type: object
      required:
        - messageId
        - schemaVersion
        - eventType
        - bookingId
        - customerId
        - eventId
        - cancellationReason
        - cancellationSource
        - refundEntitlement
        - status
        - occurredAt
      properties:
        messageId:
          type: string
          format: uuid
        schemaVersion:
          type: string
          const: '1.0.0'
        eventType:
          type: string
          const: 'booking.cancellation-requested'
        bookingId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        cancellationReason:
          type: string
          maxLength: 500
        cancellationSource:
          type: string
          enum:
            - CUSTOMER
            - ORGANISER
            - ADMIN
            - EVENT_CANCELLED
            - VENUE_SUSPENDED
          description: Actor or system event that triggered the cancellation.
        refundEntitlement:
          type: object
          description: |
            Snapshot of the CancellationPolicy evaluation at cancellation time.
            Used by the compensation saga to compute the refund amount.
            The policy is immutable after first ticket sold (PRD §7.1).
          required:
            - refundPercentage
            - refundAmount
          properties:
            refundPercentage:
              type: string
              pattern: '^\d+\.\d{4}$'
              description: Fraction of totalAmount refundable (0.0000 to 1.0000)
              example: '0.5000'
            refundAmount:
              $ref: '#/components/schemas/MoneyAmount'
        status:
          type: string
          const: 'CANCELLATION_REQUESTED'
        occurredAt:
          type: string
          format: date-time

    BookingCancelledPayload:
      type: object
      required:
        - messageId
        - schemaVersion
        - eventType
