          type: string
          const: 'REFUND_CONFIRMED'
        occurredAt:
          type: string
          format: date-time

    CancelBookingCommandPayload:
      type: object
      required:
        - messageId
        - schemaVersion
        - commandType
        - bookingId
        - reason
        - source
        - issuedBy
        - issuedAt
      properties:
        messageId:
          type: string
          format: uuid
        schemaVersion:
          type: string
          const: '1.0.0'
        commandType:
          type: string
          const: 'cancel-booking'
        bookingId:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 500
        source:
          type: string
          enum:
            - ADMIN
            - EVENT_CANCELLED
            - VENUE_SUSPENDED
            - ORGANISER
        issuedBy:
          type: string
          format: uuid
          description: userId (Admin/Organiser) or serviceId (event-service) that issued the command.
        eventId:
          type: string
          format: uuid
          description: |
            Present when source is EVENT_CANCELLED or VENUE_SUSPENDED.
            Identifies the event or venue whose state triggered this cascade.
        issuedAt:
          type: string
          format: date-time

    CompensateBookingCommandPayload:
      type: object
      required:
        - messageId
        - schemaVersion
        - commandType
        - bookingId
        - compensationStep
        - failedForwardStep
        - occurredAt
      properties:
        messageId:
          type: string
          format: uuid
        schemaVersion:
          type: string
          const: '1.0.0'
        commandType:
          type: string
          const: 'compensate-booking'
        bookingId:
          type: string
          format: uuid
        compensationStep:
          type: string
          enum:
            - RELEASE_SEATS       # HELD → AVAILABLE in Redis + PG
            - REVERSE_PAYMENT     # Initiate refund via Payment Service REST
            - VOID_TICKETS        # Mark issued tickets as VOIDED
            - CANCEL_DISBURSEMENT # Cancel scheduled disbursement records
          description: Which compensation action the Booking Service must execute.
        failedForwardStep:
          type: string
          description: The saga forward step that failed, for audit and alerting.
          example: 'COMMIT_SEATS'
        failureReason:
          type: string
          description: Exception class and brief message from the failed step.
          example: 'io.grpc.StatusRuntimeException: UNAVAILABLE: seat-inventory-service unreachable'
        occurredAt:
          type: string
          format: date-time