# File: fraud.yaml
# Repo: stagepass-docs
# Path: /docs/api/fraud.yaml
openapi: 3.1.0

info:
  title: StagePass — Fraud Detection Service API (Admin Endpoints)
  version: 1.0.0
  description: |
    Exposes Admin-facing REST endpoints for fraud alert review and action.
    The fraud scoring pipeline is event-driven (Kafka) — this REST API is the
    Admin dashboard surface only. There are no public or Customer-facing endpoints.

    Fraud scores are published within 10s of booking placement. (NFR-PERF-011)
    If this service is down, bookings proceed as LOW risk (fail-open). Fraud
    detection never blocks booking completion. (NFR-AVAIL-005)

    All Admin actions (hold booking, flag account, escalate) are logged with
    actorId, timestamp, and reason. (PRD §6.4)

    Fraud signals consumed from Kafka (no REST write path for scores):
    - `booking.confirmed` → velocity checks, device fingerprint analysis
    - `payment.confirmed` → payment method risk scoring
    Scores are published to `fraud.score` Kafka topic for Booking Service to consume.
  x-service-tier: T3
  x-repo: stagepass-fraud-detection-service
  x-traces-to:
    - PRD §8.4 FR-A-004 (Admin fraud review)
    - PRD §8.5 (AI features — fraud detection)
    - NFR-PERF-011 (score within 10s of booking)
    - NFR-AVAIL-005 (fail-open — fraud never blocks booking)

servers:
  - url: http://localhost:8094
    description: Local development
  - url: https://api.stagepass.dev/fraud
    description: Staging

tags:
  - name: Alerts
    description: Fraud alerts raised by the detection pipeline
  - name: Scores
    description: Risk scores for specific bookings
  - name: Health

paths:

  /fraud/alerts:
    get:
      operationId: listFraudAlerts
      tags: [Alerts]
      summary: List fraud alerts (Admin only)
      description: |
        Returns fraud alerts sorted by severity and creation time. Alerts are
        generated by the ML pipeline when risk score exceeds threshold or
        velocity anomalies are detected. (PRD FR-A-004)
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AlertStatus'
        - name: severity
          in: query
          schema:
            $ref: '#/components/schemas/AlertSeverity'
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated fraud alert list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /fraud/alerts/{alertId}:
    get:
      operationId: getFraudAlert
      tags: [Alerts]
      summary: Get a single fraud alert with full signal detail (Admin only)
      parameters:
        - $ref: '#/components/parameters/AlertId'
      responses:
        '200':
          description: Fraud alert detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FraudAlert'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /fraud/alerts/{alertId}/action:
    put:
      operationId: actionFraudAlert
      tags: [Alerts]
      summary: Action a fraud alert (Admin only)
      description: |
        Admin reviews the alert and takes one of the following actions:
        - HOLD_BOOKING: suspends the booking from disbursement pending investigation
        - FLAG_ACCOUNT: marks the Customer account for review (does not suspend)
        - ESCALATE: marks for senior review; adds to escalation queue
        - DISMISS: marks as false positive; clears the alert

        All actions are logged with the Admin's userId, timestamp, and reason.
        (PRD §6.4 — Admin constraints)
      parameters:
        - $ref: '#/components/parameters/AlertId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertActionRequest'
      responses:
        '200':
          description: Alert actioned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FraudAlert'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Alert is already in a terminal state (DISMISSED or RESOLVED).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /fraud/scores/{bookingId}:
    get:
      operationId: getFraudScore
      tags: [Scores]
      summary: Get the fraud risk score for a specific booking (Admin only)
      description: |
        Returns the most recent fraud score for a booking, including the signals
        that contributed to it (velocity, device fingerprint, payment risk,
        scalping indicators). Scores are updated when new signals arrive.
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Fraud risk score for the booking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FraudScore'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No score computed yet for this booking (may be pending pipeline processing).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /health/live:
    get:
      operationId: liveness
      tags: [Health]
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /health/ready:
    get:
      operationId: readiness
      tags: [Health]
      description: Checks PostgreSQL, Kafka consumer group, and ML model loading.
      security: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AlertId:
      name: alertId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ProblemDetail:
      type: object
      required: [type, title, status, detail, instance, traceId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        traceId:
          type: string

    AlertStatus:
      type: string
      enum: [OPEN, UNDER_REVIEW, ESCALATED, DISMISSED, RESOLVED]

    AlertSeverity:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    RiskLevel:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    FraudAlert:
      type: object
      required: [alertId, bookingId, customerId, severity, status, riskScore, signals, createdAt]
      properties:
        alertId:
          type: string
          format: uuid
        bookingId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
          nullable: true
        severity:
          $ref: '#/components/schemas/AlertSeverity'
        status:
          $ref: '#/components/schemas/AlertStatus'
        riskScore:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: ML model risk score. Higher = more suspicious.
        signals:
          type: array
          description: Contributing fraud signals.
          items:
            type: object
            required: [signalType, value, weight]
            properties:
              signalType:
                type: string
                enum:
                  - VELOCITY_ANOMALY    # Too many bookings in short window
                  - DEVICE_FINGERPRINT # Unusual device pattern
                  - PAYMENT_RISK       # Payment method associated with chargebacks
                  - SCALPING_INDICATOR # Multiple bookings for same high-demand event
                  - ACCOUNT_AGE        # New account booking premium tickets
              value:
                type: number
                format: double
              weight:
                type: number
                format: double
              description:
                type: string
        actionTaken:
          type: string
          enum: [HOLD_BOOKING, FLAG_ACCOUNT, ESCALATE, DISMISS]
          nullable: true
        actionedBy:
          type: string
          format: uuid
          nullable: true
          description: userId of the Admin who actioned this alert.
        actionReason:
          type: string
          nullable: true
        actionedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AlertPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FraudAlert'
        nextCursor:
          type: string
          nullable: true

    AlertActionRequest:
      type: object
      required: [action, reason]
      properties:
        action:
          type: string
          enum: [HOLD_BOOKING, FLAG_ACCOUNT, ESCALATE, DISMISS]
        reason:
          type: string
          minLength: 10
          maxLength: 1000
          description: Mandatory rationale for the action. Stored in audit log.

    FraudScore:
      type: object
      required: [bookingId, riskLevel, riskScore, scoredAt, modelVersion]
      properties:
        bookingId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        riskLevel:
          $ref: '#/components/schemas/RiskLevel'
        riskScore:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
        signals:
          type: array
          items:
            type: object
            properties:
              signalType:
                type: string
              value:
                type: number
        scoredAt:
          type: string
          format: date-time
          description: |
            Time when the fraud score was computed. Per NFR-PERF-011, this must be
            within 10s of booking placement.
        modelVersion:
          type: string
          description: MLflow model version that produced this score.

    HealthStatus:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [UP, DOWN, DEGRADED]
        checks:
          type: object
          additionalProperties:
            type: string

  responses:
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    Forbidden:
      description: Role ADMIN required.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

security:
  - bearerAuth: []